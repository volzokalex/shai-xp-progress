<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shai — XP Progress Prototype</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#0B0F1A;
    --panel:#141B2D;
    --panel-2:#1B2341;
    --border:#2A3354;
    --border-glow:#3D4A7A;
    --text:#E8ECFF;
    --muted:#8A94B8;
    --accent:#7C3AED;
    --accent-2:#22D3EE;
    --foundation:#5EEAD4;
    --builder:#FCD34D;
    --expert:#F472B6;
    --seed:#10B981;
    --flame:#F97316;
    --crystal:#A78BFA;
    --warn:#EF4444;
    --good:#22C55E;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100%;overflow-x:hidden;}
  body{background:radial-gradient(ellipse at top,#1a1f3a 0%,#0B0F1A 60%);}
  #root{max-width:480px;margin:0 auto;padding:16px 14px 40px;}

  /* ── Headings ── */
  .title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px;}

  /* ── Mission slots ── */
  .slots{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
  .slot{aspect-ratio:1;border:1.5px solid var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:10px;font-weight:700;transition:transform .1s,border-color .15s;user-select:none;position:relative;}
  .slot:active{transform:scale(.94);}
  .slot-num{font-size:9px;color:var(--muted);font-weight:600;margin-bottom:2px;}
  .slot-type{font-size:10px;letter-spacing:.3px;}
  .slot.foundation{border-color:var(--foundation);color:var(--foundation);background:rgba(94,234,212,.08);}
  .slot.builder{border-color:var(--builder);color:var(--builder);background:rgba(252,211,77,.08);}
  .slot.expert{border-color:var(--expert);color:var(--expert);background:rgba(244,114,182,.08);}

  /* ── XP info ── */
  .xp-info{display:flex;justify-content:space-between;gap:8px;margin-top:12px;font-size:12px;}
  .xp-info-item{flex:1;background:var(--panel-2);border-radius:8px;padding:8px 6px;text-align:center;}
  .xp-info-label{font-size:9px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
  .xp-info-value{font-size:13px;font-weight:700;}
  .total-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:10px 12px;background:var(--panel-2);border-radius:10px;}
  .total-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .total-value{font-size:18px;font-weight:800;}
  .total-value.warn{color:var(--warn);}
  .total-value.good{color:var(--good);}
  .warn-msg{font-size:10px;color:var(--warn);margin-top:6px;text-align:center;}

  .play-again{width:100%;margin-top:10px;padding:11px;background:transparent;border:1.5px solid var(--border);border-radius:10px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:border-color .15s,color .15s;}
  .play-again:hover{border-color:var(--accent-2);color:var(--accent-2);}

  /* ── Progress bar ── */
  .level-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .level-name{font-size:20px;font-weight:800;letter-spacing:.5px;background:linear-gradient(90deg,var(--accent-2),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .level-num{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;}
  .xp-counter{font-size:11px;color:var(--muted);}
  .bar-wrap{position:relative;height:20px;background:var(--panel-2);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
  .bar-fill{height:100%;background:linear-gradient(90deg,#22D3EE 0%,#7C3AED 50%,#EC4899 100%);border-radius:12px;transition:width .8s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 20px rgba(124,58,237,.5);position:relative;}
  .bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 2s infinite;}
  @keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}

  .xp-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:900;color:#FDE68A;text-shadow:0 0 20px rgba(252,211,77,.8),0 2px 8px rgba(0,0,0,.6);pointer-events:none;animation:xpPop 1.2s cubic-bezier(.2,.8,.2,1) forwards;letter-spacing:1px;}
  @keyframes xpPop{0%{transform:translate(-50%,-50%) scale(.3);opacity:0;}20%{transform:translate(-50%,-50%) scale(1.3);opacity:1;}60%{transform:translate(-50%,-100%) scale(1.1);opacity:1;}100%{transform:translate(-50%,-200%) scale(.9);opacity:0;}}

  /* ── Tabs ── */
  .tabs{display:flex;gap:6px;margin:16px 0 12px;}
  .tab{flex:1;padding:11px;background:var(--panel);border:1px solid var(--border);border-radius:10px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;position:relative;}
  .tab.active{background:var(--panel-2);color:var(--text);border-color:var(--accent);}
  .tab-badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;background:var(--expert);color:#000;font-size:10px;font-weight:900;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;}

  /* ── Mission map ── */
  .map{position:relative;padding:12px 0 20px;}
  .map-row{display:flex;align-items:center;margin-bottom:4px;}
  .map-row.left{justify-content:flex-start;}
  .map-row.right{justify-content:flex-end;}
  .map-row.center{justify-content:center;}
  .node{width:82px;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .node-btn{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;cursor:pointer;border:3px solid;position:relative;transition:transform .15s;user-select:none;}
  .node-btn:active{transform:scale(.92);}
  .node-btn.disabled{cursor:not-allowed;opacity:.5;}
  .node-btn.completed{background:var(--good);border-color:var(--good);color:#fff;box-shadow:0 0 18px rgba(34,197,94,.5);}
  .node-btn.foundation{background:rgba(94,234,212,.15);border-color:var(--foundation);color:var(--foundation);}
  .node-btn.builder{background:rgba(252,211,77,.15);border-color:var(--builder);color:var(--builder);}
  .node-btn.expert{background:rgba(244,114,182,.15);border-color:var(--expert);color:var(--expert);}
  .node-btn.active{animation:pulse 1.8s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(124,58,237,.6);}50%{box-shadow:0 0 0 8px rgba(124,58,237,0);}}
  .node-label{font-size:10px;text-align:center;line-height:1.25;color:var(--text);font-weight:600;min-height:24px;}
  .node-type{font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;}
  .node-type.foundation{color:var(--foundation);}
  .node-type.builder{color:var(--builder);}
  .node-type.expert{color:var(--expert);}

  /* ── Cards ── */
  .cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .card{background:linear-gradient(145deg,var(--panel-2),var(--panel));border:1.5px solid var(--border);border-radius:14px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;overflow:hidden;}
  .card.seed{border-color:var(--seed);}
  .card.flame{border-color:var(--flame);}
  .card.crystal{border-color:var(--crystal);}
  .card::before{content:'';position:absolute;inset:-50%;background:radial-gradient(circle at 50% 0%,var(--glow),transparent 60%);opacity:.25;pointer-events:none;}
  .card.seed{--glow:var(--seed);}
  .card.flame{--glow:var(--flame);}
  .card.crystal{--glow:var(--crystal);}
  .card-icon{font-size:36px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));}
  .card-level{font-size:9px;color:var(--muted);letter-spacing:1px;font-weight:700;text-transform:uppercase;}
  .card-name{font-size:12px;font-weight:700;text-align:center;line-height:1.25;}
  .card-date{font-size:9px;color:var(--muted);margin-top:2px;}
  .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
  .empty-icon{font-size:40px;opacity:.4;margin-bottom:10px;}

  /* ── Level-up overlay ── */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(8px);animation:fadeIn .3s;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .overlay-inner{max-width:340px;width:100%;text-align:center;}
  .overlay-title{font-size:13px;color:var(--accent-2);letter-spacing:3px;font-weight:800;text-transform:uppercase;margin-bottom:8px;animation:fadeSlide .6s .1s both;}
  .overlay-name{font-size:36px;font-weight:900;margin-bottom:30px;background:linear-gradient(90deg,var(--accent-2),var(--accent),#EC4899);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:1px;animation:fadeSlide .6s .2s both;}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  .big-card{background:linear-gradient(145deg,var(--panel-2),var(--panel));border:2px solid;border-radius:20px;padding:30px 20px;position:relative;overflow:hidden;animation:cardReveal .8s .4s both cubic-bezier(.2,.8,.2,1);}
  .big-card.seed{border-color:var(--seed);box-shadow:0 0 50px rgba(16,185,129,.4);}
  .big-card.flame{border-color:var(--flame);box-shadow:0 0 50px rgba(249,115,22,.4);}
  .big-card.crystal{border-color:var(--crystal);box-shadow:0 0 50px rgba(167,139,250,.4);}
  @keyframes cardReveal{from{opacity:0;transform:scale(.6) rotate(-10deg);}to{opacity:1;transform:scale(1) rotate(0);}}
  .big-card-icon{font-size:80px;margin-bottom:12px;filter:drop-shadow(0 8px 20px rgba(0,0,0,.5));animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  .big-card-style{font-size:10px;letter-spacing:2.5px;font-weight:800;margin-bottom:6px;text-transform:uppercase;}
  .big-card-style.seed{color:var(--seed);}
  .big-card-style.flame{color:var(--flame);}
  .big-card-style.crystal{color:var(--crystal);}
  .big-card-skill{font-size:20px;font-weight:800;margin-bottom:6px;}
  .big-card-lv{font-size:11px;color:var(--muted);letter-spacing:1px;}
  .dismiss{margin-top:24px;width:100%;padding:14px;background:linear-gradient(90deg,var(--accent),var(--accent-2));border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:1px;text-transform:uppercase;animation:fadeSlide .6s 1s both;}
  .dismiss:active{transform:scale(.97);}

  /* Confetti particles */
  .particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .particle{position:absolute;width:8px;height:8px;border-radius:50%;animation:particleFloat 2.5s linear infinite;}
  @keyframes particleFloat{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-20vh) scale(1);opacity:0;}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ─────────── Constants ───────────

const MISSION_NAMES = [
  'Your First AI Prompt',
  'Automate Your Inbox',
  'Build a Landing Page',
  'Create an AI Avatar Reel',
  'Write a Sales Email with AI',
  'Analyze Data with Claude',
  'Generate a Content Plan',
  'Build a No-Code App',
  'AI Research Assistant',
  'Automate Social Media',
  'Client Report Automation',
  'Full AI Workflow — Capstone',
];

const WEIGHTS = { Foundation: 1, Builder: 2.5, Expert: 4.5 };
const TARGET_XP = 5950;

// Option B — dynamic XP based on plan composition
function computeXPByType(types){
  const totalWeight = types.reduce((s, t) => s + WEIGHTS[t], 0);
  if (totalWeight === 0) return { Foundation:0, Builder:0, Expert:0 };
  const perWeight = TARGET_XP / totalWeight;
  return {
    Foundation: Math.round(perWeight * WEIGHTS.Foundation),
    Builder:    Math.round(perWeight * WEIGHTS.Builder),
    Expert:     Math.round(perWeight * WEIGHTS.Expert),
  };
}

// Default composition: 2F + 4B + 6E = 6,100 XP (reaches Level 10)
const DEFAULT_TYPES = [
  'Foundation','Foundation',
  'Builder','Builder','Builder','Builder',
  'Expert','Expert','Expert','Expert','Expert','Expert'
];

// Level curve (XP to complete that level)
const LEVELS = [
  { level:1, name:'Curious',     xpToNext:100 },
  { level:2, name:'Explorer',    xpToNext:150 },
  { level:3, name:'Prompter',    xpToNext:200 },
  { level:4, name:'Builder',     xpToNext:250 },
  { level:5, name:'Operator',    xpToNext:400 },
  { level:6, name:'Optimizer',   xpToNext:550 },
  { level:7, name:'Trailblazer', xpToNext:700 },
  { level:8, name:'Architect',   xpToNext:900 },
  { level:9, name:'Visionary',   xpToNext:1200 },
  { level:10,name:'Legend',      xpToNext:1500 },
];

// Cumulative threshold at which you ENTER this level
const LEVEL_THRESHOLDS = (() => {
  const arr = [0]; let sum = 0;
  for (let i = 0; i < LEVELS.length - 1; i++) { sum += LEVELS[i].xpToNext; arr.push(sum); }
  return arr; // [0, 100, 250, 450, 700, 1100, 1650, 2350, 3250, 4450]
})();

const SKILL_NAMES = [
  'First Prompt Written',
  'AI Tool Basics Mastered',
  'Prompt Engineering',
  'Content Automation',
  'Workflow Integration',
  'Advanced Prompting',
  'Multi-Tool Pipelines',
  'AI System Design',
  'Strategic AI Leadership',
  'AI Mastery Achieved',
];

const MIN_PLAN_XP = 5950;

// ─────────── Helpers ───────────

function getLevelFromXP(xp){
  let lv = 1;
  for (let i = 0; i < LEVEL_THRESHOLDS.length; i++) {
    if (xp >= LEVEL_THRESHOLDS[i]) lv = i + 1;
  }
  return lv;
}
function getLevelProgress(xp, level){
  const start = LEVEL_THRESHOLDS[level-1] || 0;
  const need = LEVELS[level-1].xpToNext;
  const within = Math.max(0, xp - start);
  const pct = Math.min(100, (within / need) * 100);
  return { within, need, pct };
}
function styleForLevel(lv){
  if (lv <= 3) return 'seed';
  if (lv <= 7) return 'flame';
  return 'crystal';
}
function iconForStyle(style){
  return style === 'seed' ? '🌱' : style === 'flame' ? '🔥' : '💎';
}
function formatDate(d){
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${m[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

// ─────────── Components ───────────

function PlanConfig({ types, setType, hasAnyCompleted, onPlayAgain, xpByType }) {
  const counts = { Foundation:0, Builder:0, Expert:0 };
  types.forEach(t => counts[t]++);
  const total = counts.Foundation*xpByType.Foundation + counts.Builder*xpByType.Builder + counts.Expert*xpByType.Expert;

  const cycle = (t) => t === 'Foundation' ? 'Builder' : t === 'Builder' ? 'Expert' : 'Foundation';

  return (
    <div className="panel">
      <div className="title">Plan Configuration</div>
      <div className="slots">
        {types.map((t, i) => (
          <div key={i}
               className={`slot ${t.toLowerCase()}`}
               onClick={() => !hasAnyCompleted && setType(i, cycle(t))}
               style={{opacity: hasAnyCompleted ? .55 : 1, cursor: hasAnyCompleted ? 'not-allowed' : 'pointer'}}>
            <div className="slot-num">Mission #{i+1}</div>
            <div className="slot-type">{t.charAt(0)}</div>
          </div>
        ))}
      </div>

      <div className="title" style={{marginTop:14}}>Mission Type</div>
      <div className="xp-info">
        <div className="xp-info-item">
          <div className="xp-info-label" style={{color:'var(--foundation)'}}>Foundation</div>
          <div className="xp-info-value">{counts.Foundation} × {xpByType.Foundation}</div>
        </div>
        <div className="xp-info-item">
          <div className="xp-info-label" style={{color:'var(--builder)'}}>Builder</div>
          <div className="xp-info-value">{counts.Builder} × {xpByType.Builder}</div>
        </div>
        <div className="xp-info-item">
          <div className="xp-info-label" style={{color:'var(--expert)'}}>Expert</div>
          <div className="xp-info-value">{counts.Expert} × {xpByType.Expert}</div>
        </div>
      </div>

      <div className="total-row">
        <div className="total-label">Total Plan XP</div>
        <div className="total-value good">{total.toLocaleString()} XP</div>
      </div>
      {hasAnyCompleted && <div className="warn-msg" style={{color:'var(--muted)'}}>Mission types locked during play. Tap Play Again to edit.</div>}

      <button className="play-again" onClick={onPlayAgain}>↻ Play Again</button>
    </div>
  );
}

function ProgressBar({ xp, xpPopup }){
  const level = getLevelFromXP(xp);
  const { within, need, pct } = getLevelProgress(xp, level);
  return (
    <div className="panel">
      <div className="level-head">
        <div>
          <div className="level-num">LEVEL {level}</div>
          <div className="level-name">{LEVELS[level-1].name}</div>
        </div>
        <div className="xp-counter">{within} / {need} XP</div>
      </div>
      <div className="bar-wrap">
        <div className="bar-fill" style={{width: pct + '%'}}></div>
        {xpPopup && <div className="xp-popup">+{xpPopup} XP</div>}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--muted)',marginTop:6}}>
        <span>Total: {xp.toLocaleString()} XP</span>
        <span>Max: {MIN_PLAN_XP.toLocaleString()} XP</span>
      </div>
    </div>
  );
}

function MissionMap({ types, completed, onComplete }){
  const rows = [];
  // zigzag: row pattern left(2), right(2), left(2), right(2), left(2), right(2) — 6 rows x 2
  // Simpler: 12 nodes split into 6 rows of 2, alternating alignment
  for (let r = 0; r < 6; r++){
    const idx1 = r*2, idx2 = r*2+1;
    const align = r % 2 === 0 ? 'row-left' : 'row-right';
    rows.push({idx1, idx2, align});
  }

  const renderNode = (i) => {
    const type = types[i].toLowerCase();
    const done = completed[i];
    const nextIdx = completed.findIndex(c => !c);
    const isNext = nextIdx === i;
    const disabled = done || !isNext;
    return (
      <div className="node" key={i}>
        <div className={`node-btn ${done ? 'completed' : type} ${isNext && !done ? 'active' : ''} ${disabled && !done ? 'disabled' : ''}`}
             onClick={() => !disabled && onComplete(i)}>
          {done ? '✓' : (i+1)}
        </div>
        <div className={`node-type ${type}`}>{types[i]}</div>
        <div className="node-label">{MISSION_NAMES[i]}</div>
      </div>
    );
  };

  return (
    <div className="panel">
      <div className="title">Mission Map — 12 missions</div>
      <div className="map">
        {rows.map((row, ri) => (
          <div key={ri} style={{display:'flex',justifyContent:ri%2===0?'flex-start':'flex-end',gap:12,padding:'8px 4px'}}>
            {ri%2===0 ? (
              <>{renderNode(row.idx1)}{renderNode(row.idx2)}</>
            ) : (
              <>{renderNode(row.idx2)}{renderNode(row.idx1)}</>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function CardVault({ cards }){
  if (cards.length === 0) {
    return (
      <div className="panel">
        <div className="empty">
          <div className="empty-icon">🏆</div>
          <div>Complete missions to earn your first card</div>
        </div>
      </div>
    );
  }
  return (
    <div className="panel">
      <div className="title">Achievement Cards — {cards.length} / 10</div>
      <div className="cards-grid">
        {cards.map((c, i) => (
          <div key={i} className={`card ${c.style}`}>
            <div className="card-icon">{iconForStyle(c.style)}</div>
            <div className="card-level">LV {c.level} · {c.styleName}</div>
            <div className="card-name">{c.skill}</div>
            <div className="card-date">{c.date}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function LevelUpOverlay({ card, onClose }){
  const particles = useMemo(() => (
    Array.from({length:30}).map((_,i) => ({
      left: Math.random()*100,
      delay: Math.random()*2,
      color: ['#22D3EE','#7C3AED','#EC4899','#FCD34D','#10B981'][i%5],
      size: 6 + Math.random()*6
    }))
  ), []);
  return (
    <div className="overlay">
      <div className="particles">
        {particles.map((p, i) => (
          <div key={i} className="particle" style={{
            left: p.left+'%',
            background: p.color,
            width: p.size,
            height: p.size,
            animationDelay: p.delay+'s',
            boxShadow:`0 0 12px ${p.color}`
          }}/>
        ))}
      </div>
      <div className="overlay-inner">
        <div className="overlay-title">Level Up</div>
        <div className="overlay-name">{card.levelName}</div>
        <div className={`big-card ${card.style}`}>
          <div className="big-card-icon">{iconForStyle(card.style)}</div>
          <div className={`big-card-style ${card.style}`}>{card.styleName}</div>
          <div className="big-card-skill">{card.skill}</div>
          <div className="big-card-lv">LEVEL {card.level} · {card.date}</div>
        </div>
        <button className="dismiss" onClick={onClose}>Claim Card</button>
      </div>
    </div>
  );
}

// ─────────── App ───────────

function App(){
  const [types, setTypes] = useState(DEFAULT_TYPES);
  const [completed, setCompleted] = useState(Array(12).fill(false));
  const [tab, setTab] = useState('map');
  const [cards, setCards] = useState([]);
  const [unseenCards, setUnseenCards] = useState(0);
  const [xpPopup, setXpPopup] = useState(null);
  const [pendingLevelUp, setPendingLevelUp] = useState(null);
  const [displayXP, setDisplayXP] = useState(0);
  const popupTimer = useRef(null);

  const xpByType = useMemo(() => computeXPByType(types), [types]);

  const actualXP = useMemo(() => {
    let sum = 0;
    for (let i = 0; i < 12; i++) if (completed[i]) sum += xpByType[types[i]];
    return sum;
  }, [completed, types, xpByType]);

  const hasAnyCompleted = completed.some(c => c);

  const setType = (i, t) => {
    setTypes(prev => { const nx = [...prev]; nx[i] = t; return nx; });
  };

  const handleComplete = (i) => {
    if (completed[i]) return;
    const prevLevel = getLevelFromXP(displayXP);
    const gainedXP = xpByType[types[i]];
    const newXP = actualXP + gainedXP;
    const newLevel = getLevelFromXP(newXP);

    // Mark completed
    setCompleted(prev => { const nx = [...prev]; nx[i] = true; return nx; });

    // Show +XP popup
    setXpPopup(gainedXP);
    if (popupTimer.current) clearTimeout(popupTimer.current);
    popupTimer.current = setTimeout(() => setXpPopup(null), 1200);

    // Animate bar after short delay
    setTimeout(() => setDisplayXP(newXP), 300);

    // Level up check (potentially multiple)
    if (newLevel > prevLevel) {
      // Queue all level ups between prev and new
      const newCards = [];
      for (let lv = prevLevel + 1; lv <= newLevel; lv++) {
        const st = styleForLevel(lv);
        const card = {
          level: lv,
          levelName: LEVELS[lv-1].name,
          style: st,
          styleName: st === 'seed' ? 'Seed' : st === 'flame' ? 'Flame' : 'Crystal',
          skill: SKILL_NAMES[lv-1],
          date: formatDate(new Date())
        };
        newCards.push(card);
      }
      // Show first, queue rest
      setTimeout(() => {
        setPendingLevelUp(newCards);
      }, 900);
    }
  };

  const dismissLevelUp = () => {
    const [first, ...rest] = pendingLevelUp;
    setCards(prev => [...prev, first]);
    setUnseenCards(prev => prev + 1);
    if (rest.length > 0) {
      setPendingLevelUp(rest);
    } else {
      setPendingLevelUp(null);
    }
  };

  const handlePlayAgain = () => {
    setCompleted(Array(12).fill(false));
    setDisplayXP(0);
    setCards([]);
    setUnseenCards(0);
    setXpPopup(null);
    setPendingLevelUp(null);
  };

  const handleTabChange = (t) => {
    setTab(t);
    if (t === 'cards') setUnseenCards(0);
  };

  const currentCard = pendingLevelUp && pendingLevelUp[0];

  return (
    <div>
      <div style={{textAlign:'center',margin:'8px 0 18px'}}>
        <div style={{fontSize:22,fontWeight:900,letterSpacing:.5,background:'linear-gradient(90deg,#22D3EE,#7C3AED)',WebkitBackgroundClip:'text',backgroundClip:'text',color:'transparent'}}>SHAI</div>
        <div style={{fontSize:10,color:'var(--muted)',letterSpacing:2.5,textTransform:'uppercase',marginTop:2}}>XP Progress Prototype</div>
      </div>

      <PlanConfig types={types} setType={setType} hasAnyCompleted={hasAnyCompleted} onPlayAgain={handlePlayAgain} xpByType={xpByType} />
      <ProgressBar xp={displayXP} xpPopup={xpPopup} />

      <div className="tabs">
        <button className={`tab ${tab==='map'?'active':''}`} onClick={() => handleTabChange('map')}>Mission Map</button>
        <button className={`tab ${tab==='cards'?'active':''}`} onClick={() => handleTabChange('cards')}>
          Cards
          {unseenCards > 0 && <span className="tab-badge">{unseenCards}</span>}
        </button>
      </div>

      {tab === 'map' && <MissionMap types={types} completed={completed} onComplete={handleComplete} />}
      {tab === 'cards' && <CardVault cards={cards} />}

      {currentCard && <LevelUpOverlay card={currentCard} onClose={dismissLevelUp} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
