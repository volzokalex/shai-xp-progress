<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shai — Progress System v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    /* Void */
    --black:#000000;
    --jet:#060606;
    --ink-warm:#0d0a05;

    /* Light ladder */
    --ivory:#fffaeb;
    --cream:#fff0c2;
    --gold-pale:#ffe295;
    --gold:#ffd06a;
    --amber:#ffb83e;
    --amber-deep:#ffa110;
    --sun:#ff8a00;
    --block-orange:#ff8105;
    --flame:#fb6424;
    --orange:#fa520f;

    /* Ivory opacity ladder */
    --ivory-soft:rgba(255,250,235,0.70);
    --ivory-mid:rgba(255,250,235,0.44);
    --ivory-faint:rgba(255,250,235,0.26);
    --whisper:rgba(255,250,235,0.08);
    --tissue:rgba(255,250,235,0.04);

    /* Button surface shades */
    --surface:#2a2620;
    --surface-hi:#332d24;
    --surface-shade:#221e17;
    --cream-shade:#b39547;
    --orange-shade:#b03d08;

    /* Glows */
    --glow-orange:0 0 36px -4px rgba(250,82,15,0.55), 0 0 80px -20px rgba(250,82,15,0.3);
    --glow-cream:0 0 60px -10px rgba(255,240,194,0.18), 0 0 120px -40px rgba(255,200,100,0.12);
    --glow-gradient:0 0 40px -8px rgba(255,160,30,0.35);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:var(--black);
    color:var(--ivory);
    font-family:"Bricolage Grotesque",Arial,ui-sans-serif,system-ui,sans-serif;
    font-weight:400;
    font-optical-sizing:auto;
    min-height:100%;overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  body{padding-bottom:78px;position:relative;}
  body::before{
    content:"";position:fixed;inset:0;
    background:
      radial-gradient(90% 50% at 50% -10%, rgba(250,82,15,0.07) 0%, transparent 60%),
      radial-gradient(60% 30% at 100% 80%, rgba(255,161,16,0.04) 0%, transparent 70%);
    pointer-events:none;z-index:0;
  }
  #root{max-width:480px;margin:0 auto;padding:0 14px 0;position:relative;z-index:1;}
  button{font-family:inherit;cursor:pointer;}

  /* Identity band — Fluently brand signature (DS §4.9) */
  .identity-band{
    height:10px;width:100%;max-width:480px;margin:0 auto 18px;
    display:grid;grid-template-columns:repeat(6,1fr);
    box-shadow:var(--glow-gradient);
  }
  .identity-band span{display:block;height:100%;}
  .identity-band span:nth-child(1){background:#ffd900;}
  .identity-band span:nth-child(2){background:#ffe295;}
  .identity-band span:nth-child(3){background:#ffa110;}
  .identity-band span:nth-child(4){background:#ff8105;}
  .identity-band span:nth-child(5){background:#fb6424;}
  .identity-band span:nth-child(6){background:#fa520f;}

  /* Top brand */
  .top-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;padding:2px;}
  .brand{
    font-size:24px;font-weight:700;letter-spacing:-0.03em;
    color:var(--ivory);font-variation-settings:"opsz" 36;line-height:1;
  }
  .brand-tag{
    font-size:10px;color:var(--amber-deep);
    letter-spacing:0.22em;text-transform:uppercase;margin-top:6px;
  }

  /* Structural container — sharp, whisper divider */
  .panel{
    background:transparent;
    border-top:1px solid var(--whisper);
    border-radius:0;padding:24px 4px;margin-bottom:4px;
  }
  .title{
    font-size:10px;font-weight:400;color:var(--amber-deep);
    letter-spacing:0.22em;text-transform:uppercase;margin-bottom:16px;
  }

  /* XP bar (account-level) */
  .level-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:12px;}
  .level-name{
    font-size:32px;font-weight:400;
    letter-spacing:-0.035em;line-height:0.98;
    color:var(--ivory);font-variation-settings:"opsz" 48;
  }
  .level-num{
    font-size:10px;color:var(--ivory-faint);
    font-weight:400;letter-spacing:0.22em;text-transform:uppercase;
    margin-bottom:6px;
  }
  .xp-counter{font-size:12px;color:var(--ivory-mid);text-align:right;letter-spacing:-0.01em;line-height:1.4;}
  .bar-wrap{
    position:relative;height:4px;
    background:var(--whisper);border-radius:9999px;overflow:visible;
  }
  .bar-fill{
    height:100%;
    background:linear-gradient(90deg,var(--amber),var(--orange));
    border-radius:9999px;
    transition:width .7s cubic-bezier(.2,.8,.2,1);
    box-shadow:0 0 12px 0 rgba(250,82,15,0.75);
  }
  .xp-popup{
    position:absolute;top:-32px;left:50%;
    font-size:18px;font-weight:700;color:var(--orange);
    letter-spacing:-0.01em;pointer-events:none;
    animation:xpPop 1.2s cubic-bezier(.2,.8,.2,1) forwards;
    white-space:nowrap;z-index:5;
  }
  @keyframes xpPop{
    0%{opacity:0;transform:translate(-50%,10px) scale(.85);}
    25%{opacity:1;transform:translate(-50%,0) scale(1);}
    100%{opacity:0;transform:translate(-50%,-32px) scale(1);}
  }
  .total-xp{display:flex;justify-content:space-between;font-size:11px;color:var(--ivory-mid);margin-top:14px;letter-spacing:-0.01em;}

  /* Plan cards — sharp, DS §4.7 tier variants */
  .plan-card{
    border:1px solid var(--whisper);background:var(--tissue);
    border-radius:0;padding:20px 18px;margin-bottom:14px;
    cursor:pointer;position:relative;
    transition:border-color .15s,background .15s;
  }
  .plan-card:hover{border-color:var(--ivory-mid);}
  .plan-card.builder{
    background:var(--cream);color:var(--jet);
    border-color:var(--cream);
    box-shadow:var(--glow-cream);
  }
  .plan-card.builder:hover{border-color:var(--cream);}
  .plan-card.expert{
    background:transparent;
    border-color:rgba(255,161,16,0.35);
  }
  .plan-card.expert:hover{border-color:var(--amber-deep);}
  .plan-here-pill{
    position:absolute;top:14px;right:14px;
    font-size:9px;letter-spacing:0.22em;text-transform:uppercase;
    background:var(--orange);color:var(--ivory);
    padding:5px 10px;border-radius:9999px;font-weight:700;
    box-shadow:0 2px 0 0 var(--orange-shade), 0 6px 14px -3px rgba(250,82,15,0.55);
  }
  .plan-name-row{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap;padding-right:94px;}
  .plan-name{
    font-size:24px;font-weight:400;
    letter-spacing:-0.035em;line-height:1.04;
    color:var(--ivory);font-variation-settings:"opsz" 36;
  }
  .plan-card.builder .plan-name{color:var(--jet);}
  .plan-sub{font-size:13px;color:var(--ivory-mid);margin-bottom:16px;line-height:1.45;letter-spacing:-0.005em;}
  .plan-card.builder .plan-sub{color:rgba(6,6,6,0.62);}
  .plan-compo{display:flex;gap:6px;font-size:10px;margin-bottom:14px;letter-spacing:0.2em;text-transform:uppercase;}
  .plan-chip{
    padding:4px 8px;border:1px solid var(--whisper);
    color:var(--ivory-faint);border-radius:0;font-weight:400;
  }
  .plan-chip.f{color:var(--ivory-faint);}
  .plan-chip.b{color:var(--amber);border-color:rgba(255,184,62,0.3);}
  .plan-chip.e{color:var(--amber-deep);border-color:rgba(255,161,16,0.35);}
  .plan-card.builder .plan-chip{border-color:rgba(6,6,6,0.18);}
  .plan-card.builder .plan-chip.f{color:rgba(6,6,6,0.55);}
  .plan-card.builder .plan-chip.b{color:var(--orange-shade);border-color:rgba(176,61,8,0.35);}
  .plan-card.builder .plan-chip.e{color:var(--orange);border-color:rgba(250,82,15,0.4);}
  .plan-progress{display:flex;align-items:center;gap:12px;}
  .plan-pbar{flex:1;height:4px;background:var(--whisper);border-radius:9999px;overflow:hidden;}
  .plan-card.builder .plan-pbar{background:rgba(6,6,6,0.15);}
  .plan-pfill{
    height:100%;
    background:linear-gradient(90deg,var(--amber),var(--orange));
    transition:width .6s;
  }
  .plan-pct{font-size:11px;color:var(--ivory-mid);font-weight:400;min-width:44px;text-align:right;letter-spacing:-0.01em;}
  .plan-card.builder .plan-pct{color:rgba(6,6,6,0.62);}
  .plan-cert-badge{
    font-size:9px;background:var(--orange);color:var(--ivory);
    padding:4px 9px;border-radius:9999px;
    font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
    box-shadow:0 2px 0 0 var(--orange-shade);
  }

  /* Configure button — secondary pressable */
  .config-btn{
    width:100%;padding:20px 24px;
    background:var(--surface);color:var(--ivory);
    border:0;border-radius:16px;
    font-size:15px;font-weight:400;letter-spacing:-0.01em;
    margin-top:6px;
    box-shadow:0 5px 0 0 var(--surface-shade), inset 0 1px 0 rgba(255,250,235,0.05);
    transition:transform .09s ease, box-shadow .09s ease, background .15s;
  }
  .config-btn:hover{background:var(--surface-hi);}
  .config-btn:active{
    transform:translateY(4px);
    box-shadow:0 1px 0 0 var(--surface-shade), inset 0 1px 0 rgba(255,250,235,0.05);
  }

  /* Back bar */
  .back-bar{display:flex;align-items:center;gap:14px;margin-bottom:20px;margin-top:8px;}
  .back-btn{
    width:52px;height:52px;flex-shrink:0;
    background:var(--surface);color:var(--ivory);
    border:0;border-radius:16px;
    font-size:16px;font-weight:400;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 5px 0 0 var(--surface-shade), inset 0 1px 0 rgba(255,250,235,0.05);
    transition:transform .09s ease, box-shadow .09s ease, background .15s;
  }
  .back-btn:hover{background:var(--surface-hi);}
  .back-btn:active{
    transform:translateY(4px);
    box-shadow:0 1px 0 0 var(--surface-shade), inset 0 1px 0 rgba(255,250,235,0.05);
  }
  .back-title{
    font-size:22px;font-weight:400;flex:1;
    letter-spacing:-0.035em;line-height:1.05;color:var(--ivory);
    font-variation-settings:"opsz" 36;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }

  /* Mission map — rounded-pressable nodes */
  .map{padding:14px 0 4px;}
  .map-row{display:flex;align-items:flex-start;gap:14px;padding:10px 4px;}
  .node{width:100px;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .node-btn{
    width:68px;height:68px;border-radius:16px;
    background:var(--surface);color:var(--ivory);
    border:0;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:400;letter-spacing:-0.01em;
    cursor:pointer;position:relative;user-select:none;
    box-shadow:0 5px 0 0 var(--surface-shade), inset 0 1px 0 rgba(255,250,235,0.05);
    transition:transform .09s ease, box-shadow .09s ease;
  }
  .node-btn:active{
    transform:translateY(4px);
    box-shadow:0 1px 0 0 var(--surface-shade), inset 0 1px 0 rgba(255,250,235,0.05);
  }
  .node-btn.completed{
    background:var(--cream);color:var(--jet);font-weight:700;
    box-shadow:0 5px 0 0 var(--cream-shade), var(--glow-cream), inset 0 1px 0 rgba(255,255,255,0.45);
  }
  .node-btn.partial::after{
    content:'';position:absolute;inset:-4px;
    border-radius:20px;border:1px solid var(--amber);opacity:.7;
  }
  .node-type{
    font-size:9px;font-weight:400;
    letter-spacing:0.2em;text-transform:uppercase;
  }
  .node-type.foundation{color:var(--ivory-faint);}
  .node-type.builder{color:var(--amber);}
  .node-type.expert{color:var(--amber-deep);}
  .node-label{
    font-size:11px;text-align:center;line-height:1.3;
    color:var(--ivory-soft);font-weight:400;
    min-height:28px;letter-spacing:-0.01em;
  }

  /* Mission summary + lessons */
  .mission-summary{
    border:1px solid var(--whisper);background:transparent;
    padding:16px;margin-bottom:20px;
  }
  .mission-summary-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px;}
  .mission-summary-title{
    font-size:18px;font-weight:400;letter-spacing:-0.02em;
    flex:1;line-height:1.2;color:var(--ivory);
  }
  .mission-summary-type{
    font-size:9px;letter-spacing:0.22em;text-transform:uppercase;
    font-weight:400;padding:5px 9px;border:1px solid var(--whisper);
    white-space:nowrap;
  }
  .mission-summary-type.foundation{color:var(--ivory-faint);}
  .mission-summary-type.builder{color:var(--amber);border-color:rgba(255,184,62,0.35);}
  .mission-summary-type.expert{color:var(--amber-deep);border-color:rgba(255,161,16,0.35);}
  .mission-summary-xp{font-size:12px;color:var(--ivory-mid);letter-spacing:-0.01em;}

  .lesson-list{display:flex;flex-direction:column;gap:10px;}
  .lesson-row{
    display:flex;align-items:center;gap:14px;
    padding:18px 20px;
    background:var(--surface);color:var(--ivory-soft);
    border:0;border-radius:16px;cursor:pointer;
    box-shadow:0 5px 0 0 var(--surface-shade), inset 0 1px 0 rgba(255,250,235,0.05);
    transition:transform .09s ease, box-shadow .09s ease, background .15s, color .15s;
  }
  .lesson-row:hover{background:var(--surface-hi);color:var(--ivory);}
  .lesson-row:active{
    transform:translateY(4px);
    box-shadow:0 1px 0 0 var(--surface-shade), inset 0 1px 0 rgba(255,250,235,0.05);
  }
  .lesson-row.done{
    background:var(--cream);color:var(--jet);cursor:default;
    box-shadow:0 5px 0 0 var(--cream-shade), var(--glow-cream), inset 0 1px 0 rgba(255,255,255,0.45);
  }
  .lesson-row.done:hover{background:var(--cream);color:var(--jet);}
  .lesson-circle{
    width:36px;height:36px;border-radius:9999px;
    background:transparent;border:1px solid var(--ivory-faint);
    color:var(--ivory-mid);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:400;
  }
  .lesson-row.done .lesson-circle{
    background:var(--orange);color:var(--ivory);border:0;
    box-shadow:0 2px 0 0 var(--orange-shade), 0 4px 10px -2px rgba(250,82,15,0.45);
  }
  .lesson-label{font-size:15px;font-weight:400;letter-spacing:-0.015em;line-height:1.2;}
  .lesson-sub{font-size:11px;color:var(--ivory-mid);margin-top:3px;letter-spacing:-0.005em;}
  .lesson-row.done .lesson-sub{color:rgba(6,6,6,0.55);}

  .mission-done-banner{
    margin-top:20px;padding:18px;
    border:1px solid rgba(255,161,16,0.4);
    background:transparent;text-align:center;
    box-shadow:var(--glow-gradient);
  }
  .mission-done-title{
    font-size:10px;color:var(--amber-deep);
    font-weight:400;letter-spacing:0.24em;text-transform:uppercase;
  }
  .mission-done-xp{font-size:14px;color:var(--ivory);margin-top:8px;letter-spacing:-0.015em;}

  /* All Missions flat list */
  .flat-mission{
    display:flex;align-items:center;gap:14px;
    padding:16px 18px;
    background:var(--surface);color:var(--ivory-soft);
    border:0;border-radius:16px;margin-bottom:10px;cursor:pointer;
    box-shadow:0 5px 0 0 var(--surface-shade), inset 0 1px 0 rgba(255,250,235,0.05);
    transition:transform .09s ease, box-shadow .09s ease, background .15s, color .15s;
  }
  .flat-mission:hover{background:var(--surface-hi);color:var(--ivory);}
  .flat-mission:active{
    transform:translateY(4px);
    box-shadow:0 1px 0 0 var(--surface-shade), inset 0 1px 0 rgba(255,250,235,0.05);
  }
  .flat-mission.done{
    background:var(--cream);color:var(--jet);cursor:default;
    box-shadow:0 5px 0 0 var(--cream-shade), var(--glow-cream), inset 0 1px 0 rgba(255,255,255,0.45);
  }
  .flat-mission.done:hover{background:var(--cream);color:var(--jet);}
  .flat-mission.locked{opacity:1;}
  .flat-type-dot{width:8px;height:8px;border-radius:9999px;flex-shrink:0;}
  .flat-type-dot.foundation{background:var(--ivory-faint);}
  .flat-type-dot.builder{background:var(--amber);box-shadow:0 0 10px rgba(255,184,62,0.6);}
  .flat-type-dot.expert{background:var(--amber-deep);box-shadow:0 0 10px rgba(255,161,16,0.6);}
  .flat-mission.done .flat-type-dot{box-shadow:none;}
  .flat-info{flex:1;min-width:0;}
  .flat-name{font-size:14px;font-weight:400;letter-spacing:-0.015em;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;}
  .flat-plan{font-size:11px;color:var(--ivory-mid);letter-spacing:-0.005em;}
  .flat-mission.done .flat-plan{color:rgba(6,6,6,0.55);}
  .flat-right{font-size:14px;color:var(--ivory-mid);font-weight:400;min-width:20px;text-align:center;}
  .flat-right.lock{color:var(--amber-deep);}
  .flat-right.done{color:var(--orange);font-size:18px;}

  /* Rewards vault */
  .rewards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .reward-card{
    border:1px solid var(--whisper);padding:26px 12px;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    position:relative;cursor:pointer;background:transparent;
    transition:border-color .15s;
  }
  .reward-card:hover{border-color:var(--ivory-mid);}
  .reward-card.unseen{
    border-color:rgba(255,161,16,0.5);
    box-shadow:var(--glow-gradient);
  }
  .reward-card.unseen::before{
    content:'NEW';position:absolute;top:8px;right:8px;
    background:var(--orange);color:var(--ivory);
    font-size:9px;font-weight:700;padding:3px 7px;
    border-radius:9999px;letter-spacing:0.18em;
    box-shadow:0 2px 0 0 var(--orange-shade);
  }
  .reward-icon{font-size:44px;filter:drop-shadow(0 4px 12px rgba(250,82,15,0.28));}
  .reward-name{font-size:13px;font-weight:400;text-align:center;line-height:1.25;letter-spacing:-0.01em;color:var(--ivory);}
  .reward-level{font-size:9px;color:var(--ivory-faint);letter-spacing:0.22em;font-weight:400;text-transform:uppercase;}

  /* Certificates */
  .cert-card{
    border:1px solid rgba(255,161,16,0.4);
    padding:24px 18px;margin-bottom:12px;
    position:relative;overflow:hidden;background:transparent;
    box-shadow:var(--glow-gradient);
  }
  .cert-seal{position:absolute;top:16px;right:16px;font-size:28px;filter:drop-shadow(0 2px 8px rgba(250,82,15,0.35));}
  .cert-label{
    font-size:9px;color:var(--amber-deep);
    letter-spacing:0.24em;text-transform:uppercase;font-weight:400;
    margin-bottom:10px;position:relative;z-index:1;
  }
  .cert-plan{
    font-size:22px;font-weight:400;letter-spacing:-0.035em;line-height:1.05;
    color:var(--ivory);margin-bottom:8px;
    font-variation-settings:"opsz" 36;
    position:relative;z-index:1;padding-right:36px;
  }
  .cert-date{font-size:11px;color:var(--ivory-mid);letter-spacing:-0.005em;position:relative;z-index:1;}

  /* Empty state */
  .empty{text-align:center;padding:70px 20px;color:var(--ivory-mid);}
  .empty-icon{font-size:56px;opacity:.5;margin-bottom:18px;filter:drop-shadow(0 4px 12px rgba(250,82,15,0.25));}
  .empty-msg{font-size:14px;line-height:1.55;max-width:300px;margin:0 auto;color:var(--ivory-soft);letter-spacing:-0.005em;}

  /* Bottom nav */
  .bottom-nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:rgba(0,0,0,0.92);backdrop-filter:blur(16px);
    border-top:1px solid var(--whisper);
    display:flex;z-index:40;
  }
  .bnav-btn{
    flex:1;background:none;border:0;
    color:var(--ivory-mid);padding:14px 4px 16px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    position:relative;transition:color .15s;
  }
  .bnav-btn:hover{color:var(--ivory-soft);}
  .bnav-btn.active{color:var(--ivory);}
  .bnav-btn.active::before{
    content:'';position:absolute;top:0;left:32%;right:32%;
    height:2px;background:var(--orange);
    box-shadow:0 0 8px rgba(250,82,15,0.7);
  }
  .bnav-icon{font-size:20px;}

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ─────────── Constants ─────────── */

const WEIGHTS = { Foundation: 1, Builder: 2.5, Expert: 4.5 };
const TARGET_XP = 5950; // Total XP per full plan

const LEVEL_RANGES = [
  { max: 3,  name: 'Curious'   },
  { max: 6,  name: 'Explorer'  },
  { max: 10, name: 'Prompter'  },
  { max: 15, name: 'Builder'   },
  { max: 20, name: 'Operator'  },
  { max: 24, name: 'Optimizer' },
  { max: Infinity, name: 'Legend' },
];

// XP needed to go FROM level n TO level n+1
function xpToNext(n){
  if (n < 1) return 100;
  const early = [100, 150, 200, 250, 400, 550, 700, 900, 1200];
  if (n <= 9) return early[n-1];
  // L10+ linear growth: 1500, 1750, 2000, ...
  return 1500 + (n - 10) * 250;
}

// Cumulative XP to ENTER a level. xpToEnter(1) = 0
const ENTER_CACHE = [0, 0];
function xpToEnter(level){
  if (level <= 1) return 0;
  if (ENTER_CACHE[level] !== undefined) return ENTER_CACHE[level];
  const val = xpToEnter(level - 1) + xpToNext(level - 1);
  ENTER_CACHE[level] = val;
  return val;
}

function getLevel(xp){
  let lv = 1;
  while (xp >= xpToEnter(lv + 1)) {
    lv++;
    if (lv > 200) break;
  }
  return lv;
}
function getLevelName(lv){
  for (const r of LEVEL_RANGES) if (lv <= r.max) return r.name;
  return 'Legend';
}
function getLevelProgress(xp, lv){
  const start = xpToEnter(lv);
  const need = xpToNext(lv);
  const within = Math.max(0, xp - start);
  return { within, need, pct: Math.min(100, (within / need) * 100) };
}

// Rewards — one per level (content manager assets for demo)
const REWARDS = [
  { level:1,  name:'First Spark',        icon:'✨' },
  { level:2,  name:'Curious Mind',       icon:'🔍' },
  { level:3,  name:'Apprentice',         icon:'📝' },
  { level:4,  name:'Trailhead',          icon:'🧭' },
  { level:5,  name:'Pathfinder',         icon:'🗺️' },
  { level:6,  name:'Discovery',          icon:'💡' },
  { level:7,  name:'Prompt Crafter',     icon:'✍️' },
  { level:8,  name:'Context Weaver',     icon:'🧶' },
  { level:9,  name:'Pattern Reader',     icon:'📚' },
  { level:10, name:'Prompt Sage',        icon:'🌟' },
  { level:11, name:'Toolsmith',          icon:'🛠️' },
  { level:12, name:'Architect',          icon:'🏗️' },
  { level:13, name:'Framework Thinker',  icon:'🧠' },
  { level:14, name:'System Designer',    icon:'🔷' },
  { level:15, name:'Master Builder',     icon:'🏛️' },
  { level:16, name:'Operator',           icon:'⚡' },
  { level:17, name:'Workflow Pro',       icon:'🔄' },
  { level:18, name:'Automation Wizard',  icon:'🤖' },
  { level:19, name:'Pipeline Master',    icon:'🚀' },
  { level:20, name:'Command Chief',      icon:'💠' },
  { level:21, name:'Optimizer',          icon:'📈' },
  { level:22, name:'Efficiency Guru',    icon:'🎯' },
  { level:23, name:'Refiner',            icon:'💎' },
  { level:24, name:'Peak Performer',     icon:'🏆' },
  { level:25, name:'Legend',             icon:'👑' },
  { level:26, name:'Mythmaker',          icon:'🌌' },
  { level:27, name:'Oracle',             icon:'🔮' },
  { level:28, name:'Visionary',          icon:'🌠' },
  { level:29, name:'Titan',              icon:'🦾' },
  { level:30, name:'Immortal',           icon:'♾️' },
];
function getRewardForLevel(lv){
  const found = REWARDS.find(r => r.level === lv);
  if (found) return { level: lv, name: found.name, icon: found.icon };
  return { level: lv, name: 'Legend Lv ' + lv, icon: '👑' };
}

// Plan definitions — each has distinct composition (mission 12 always Expert)
const PLAN_DEFS = [
  {
    id: 0,
    name: 'AI Foundations',
    subtitle: 'For total beginners',
    defaultTypes: [
      'Foundation','Foundation','Foundation','Foundation','Foundation','Foundation',
      'Builder','Builder','Builder','Builder',
      'Expert','Expert'
    ],
    missionNames: [
      'Your First Prompt','Chat Interfaces 101','Writing with AI',
      'AI for Email','Basic Image Gen','Summarize Anything',
      'Research Helper','Meeting Notes','Content Planner',
      'Social Posts with AI','Study Buddy','Personal AI Workflow'
    ],
  },
  {
    id: 1,
    name: 'Content Creator OS',
    subtitle: 'Build a content machine',
    defaultTypes: [
      'Foundation','Foundation','Foundation',
      'Builder','Builder','Builder','Builder','Builder','Builder',
      'Expert','Expert','Expert'
    ],
    missionNames: [
      'Content Brief Gen','Hook Writer','Thumbnail Ideas',
      'Short Script Pipeline','Brand Voice Prompt','Carousel Factory',
      'SEO Booster','Video Storyboard','Newsletter Engine',
      'Launch Funnel','Full Content OS','Agency Toolkit'
    ],
  },
  {
    id: 2,
    name: 'Business Automation',
    subtitle: 'Advanced — commercial projects',
    defaultTypes: [
      'Foundation','Foundation',
      'Builder','Builder','Builder','Builder',
      'Expert','Expert','Expert','Expert','Expert','Expert'
    ],
    missionNames: [
      'Process Mapping','Support Bot Brief','Lead Scoring Prompt',
      'Invoice Automation','Sales Dashboards','Data Cleanup',
      'Report Automator','CRM Sync','Pipeline Builder',
      'Revenue Ops Stack','Customer Journey AI','End-to-End Automation'
    ],
  },
];

/* ─────────── Helpers ─────────── */

// Deterministic lesson count per (plan, mission): 3–6 lessons
function lessonCount(planId, missionIdx){
  return 3 + ((planId * 5 + missionIdx * 3 + 1) % 4);
}

function xpForMission(types, missionIdx){
  const totalWeight = types.reduce((s, t) => s + WEIGHTS[t], 0);
  if (totalWeight === 0) return 0;
  return Math.round((TARGET_XP / totalWeight) * WEIGHTS[types[missionIdx]]);
}

function computeXPByType(types){
  const tw = types.reduce((s,t) => s + WEIGHTS[t], 0);
  if (tw === 0) return { Foundation:0, Builder:0, Expert:0 };
  const pw = TARGET_XP / tw;
  return {
    Foundation: Math.round(pw * WEIGHTS.Foundation),
    Builder:    Math.round(pw * WEIGHTS.Builder),
    Expert:     Math.round(pw * WEIGHTS.Expert),
  };
}

function countBy(arr){
  const c = { Foundation:0, Builder:0, Expert:0 };
  arr.forEach(t => c[t]++);
  return c;
}

function formatDate(d){
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${m[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

/* ─────────── Components ─────────── */

function TopHead(){
  return (
    <div className="top-head">
      <div>
        <div className="brand">SHAI</div>
        <div className="brand-tag">Progress System · v2</div>
      </div>
    </div>
  );
}

function ProgressBar({ xp, xpPopup }){
  const lv = getLevel(xp);
  const name = getLevelName(lv);
  const { within, need, pct } = getLevelProgress(xp, lv);
  return (
    <div className="panel">
      <div className="level-head">
        <div>
          <div className="level-num">LEVEL {lv}</div>
          <div className="level-name">{name}</div>
        </div>
        <div className="xp-counter">{within.toLocaleString()} / {need.toLocaleString()} XP</div>
      </div>
      <div className="bar-wrap">
        <div className="bar-fill" style={{ width: pct + '%' }}></div>
        {xpPopup != null && <div className="xp-popup">+{xpPopup.toLocaleString()} XP</div>}
      </div>
      <div className="total-xp">
        <span>Total XP: {xp.toLocaleString()}</span>
        <span>Account-level · no cap</span>
      </div>
    </div>
  );
}

function PlansList({ plans, progressByPlan, certs, onOpenPlan, onOpenConfig }){
  return (
    <div>
      <div className="title" style={{paddingLeft:2}}>Your Plans · {plans.length} available</div>
      {plans.map(p => {
        const pr = progressByPlan[p.id] || { done: 0, total: 12 };
        const pct = Math.round(pr.done / pr.total * 100);
        const c = countBy(p.types);
        const hasCert = certs.some(cc => cc.planId === p.id);
        const variant = p.id === 0 ? 'foundation' : p.id === 1 ? 'builder' : 'expert';
        return (
          <div key={p.id} className={"plan-card " + variant} onClick={() => onOpenPlan(p.id)}>
            {variant === 'builder' && <span className="plan-here-pill">You're here</span>}
            <div className="plan-name-row">
              <div className="plan-name">{p.name}</div>
              {hasCert && <span className="plan-cert-badge">Certified</span>}
            </div>
            <div className="plan-sub">{p.subtitle}</div>
            <div className="plan-compo">
              <span className="plan-chip f">F × {c.Foundation}</span>
              <span className="plan-chip b">B × {c.Builder}</span>
              <span className="plan-chip e">E × {c.Expert}</span>
            </div>
            <div className="plan-progress">
              <div className="plan-pbar">
                <div className="plan-pfill" style={{ width: pct + '%' }}></div>
              </div>
              <div className="plan-pct">{pr.done}/{pr.total}</div>
            </div>
          </div>
        );
      })}
      <button className="config-btn" onClick={onOpenConfig}>⚙ Configure Plans</button>
    </div>
  );
}

function MissionMap({ plan, missionState, onOpenMission }){
  const rows = [];
  for (let r = 0; r < 6; r++) rows.push([r*2, r*2+1]);

  const renderNode = (i) => {
    const type = plan.types[i].toLowerCase();
    const st = missionState[i] || { done:false, doneLessons:0, totalLessons:lessonCount(plan.id, i) };
    const done = st.done;
    const partial = !done && st.doneLessons > 0;
    return (
      <div className="node" key={i}>
        <div className={`node-btn ${done ? 'completed' : type} ${partial ? 'partial' : ''}`}
             onClick={() => onOpenMission(i)}>
          {done ? '✓' : (i+1)}
        </div>
        <div className={`node-type ${type}`}>{plan.types[i]}</div>
        <div className="node-label">{plan.missionNames[i]}</div>
      </div>
    );
  };

  return (
    <div className="panel">
      <div className="title">Mission Map · 12 missions</div>
      <div className="map">
        {rows.map((row, ri) => (
          <div key={ri} className="map-row" style={{ justifyContent: ri%2===0 ? 'flex-start' : 'flex-end' }}>
            {ri % 2 === 0
              ? (<>{renderNode(row[0])}{renderNode(row[1])}</>)
              : (<>{renderNode(row[1])}{renderNode(row[0])}</>)}
          </div>
        ))}
      </div>
    </div>
  );
}

function LessonView({ plan, missionIdx, lessonsDone, onToggleLesson, onBackToMap }){
  const total = lessonCount(plan.id, missionIdx);
  const t = plan.types[missionIdx];
  const typeL = t.toLowerCase();
  const xp = xpForMission(plan.types, missionIdx);
  const doneCount = lessonsDone.filter(Boolean).length;
  const allDone = doneCount === total;

  return (
    <div className="panel">
      <div className="title">Mission Lessons</div>
      <div className="mission-summary">
        <div className="mission-summary-row">
          <div className="mission-summary-title">{plan.missionNames[missionIdx]}</div>
          <div className={"mission-summary-type " + typeL}>{t}</div>
        </div>
        <div className="mission-summary-xp">{xp.toLocaleString()} XP on completion · {total} lessons</div>
      </div>

      <div className="lesson-list">
        {Array.from({ length: total }).map((_, li) => {
          const done = lessonsDone[li];
          return (
            <div key={li}
                 className={`lesson-row ${done ? 'done' : ''}`}
                 onClick={() => !done && onToggleLesson(li)}>
              <div className={`lesson-circle ${done ? 'done' : ''}`}>
                {done ? '✓' : li + 1}
              </div>
              <div style={{flex:1}}>
                <div className="lesson-label">Lesson {li + 1}</div>
                <div className="lesson-sub">{done ? 'Completed' : 'Tap to complete'}</div>
              </div>
            </div>
          );
        })}
      </div>

      {allDone && (
        <>
          <div className="mission-done-banner">
            <div className="mission-done-title">Mission Complete</div>
            <div className="mission-done-xp">+{xp.toLocaleString()} XP awarded</div>
          </div>
          <button className="back-to-map-btn" onClick={onBackToMap}>
            ← Back to Mission Map
          </button>
        </>
      )}
    </div>
  );
}

function AllMissions({ plans, planProgress, onTap }){
  const all = [];
  plans.forEach(p => {
    p.types.forEach((t, i) => {
      all.push({ planId:p.id, planName:p.name, missionIdx:i, name:p.missionNames[i], type:t });
    });
  });
  return (
    <div className="panel">
      <div className="title">All Missions · {all.length} total</div>
      <div style={{fontSize:13,color:'var(--ivory-mid)',marginBottom:12,lineHeight:1.5,letterSpacing:'-.005em'}}>
        Every mission across all plans. Tap Foundation/Builder to complete. Expert missions unlock only inside their plan.
      </div>
      {all.map((m, i) => {
        const st = planProgress[m.planId]?.[m.missionIdx];
        const done = st?.done;
        const isExpert = m.type === 'Expert';
        return (
          <div key={i}
               className={`flat-mission ${done ? 'done' : ''} ${isExpert && !done ? 'locked' : ''}`}
               onClick={() => onTap(m.planId, m.missionIdx, m.type)}>
            <div className={`flat-type-dot ${m.type.toLowerCase()}`}></div>
            <div className="flat-info">
              <div className="flat-name">{m.name}</div>
              <div className="flat-plan">{m.planName} · {m.type}</div>
            </div>
            <div className={`flat-right ${done ? 'done' : isExpert ? 'lock' : ''}`}>
              {done ? '✓' : isExpert ? '🔒' : '→'}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function RewardsTab({ rewards, onTap }){
  if (rewards.length === 0) {
    return (
      <div className="panel">
        <div className="empty">
          <div className="empty-icon">🏆</div>
          <div className="empty-msg">Level up to earn your first reward. Each new Level unlocks a unique card designed for that milestone.</div>
        </div>
      </div>
    );
  }
  return (
    <div className="panel">
      <div className="title">Reward Vault · {rewards.length} earned</div>
      <div className="rewards-grid">
        {rewards.map((r, i) => (
          <div key={i} className={`reward-card ${r.seen ? '' : 'unseen'}`} onClick={() => onTap(i)}>
            <div className="reward-icon">{r.icon}</div>
            <div className="reward-name">{r.name}</div>
            <div className="reward-level">Level {r.level}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CertificatesTab({ certificates }){
  if (certificates.length === 0) {
    return (
      <div className="panel">
        <div className="empty">
          <div className="empty-icon">📜</div>
          <div className="empty-msg">Complete a full plan to earn your certificate. Each certificate confirms you mastered all 12 missions of that plan.</div>
        </div>
      </div>
    );
  }
  return (
    <div className="panel">
      <div className="title">Certificates · {certificates.length}</div>
      {certificates.map((c, i) => (
        <div key={i} className="cert-card">
          <div className="cert-seal">🏅</div>
          <div className="cert-label">Certificate</div>
          <div className="cert-plan">Certified: {c.planName}</div>
          <div className="cert-date">Issued {c.date}</div>
        </div>
      ))}
    </div>
  );
}

function Configurator({ plans, setPlanTypes, onDone, onPlayAgain, hasProgress }){
  const [active, setActive] = useState(0);
  const plan = plans[active];
  const counts = countBy(plan.types);
  const xp = computeXPByType(plan.types);
  const total = counts.Foundation * xp.Foundation + counts.Builder * xp.Builder + counts.Expert * xp.Expert;

  const cycle = (t) => t === 'Foundation' ? 'Builder' : t === 'Builder' ? 'Expert' : 'Foundation';

  return (
    <div className="panel">
      <div className="title">Configure Plans</div>

      <div className="config-plan-switch">
        {plans.map(p => (
          <button key={p.id}
                  className={`config-plan-tab ${active === p.id ? 'active' : ''}`}
                  onClick={() => setActive(p.id)}>
            Plan {p.id + 1}
          </button>
        ))}
      </div>

      <div style={{fontSize:16,fontWeight:700,marginBottom:4,letterSpacing:'-.015em',color:'var(--ivory)'}}>{plan.name}</div>
      <div style={{fontSize:13,color:'var(--ivory-mid)',marginBottom:14,lineHeight:1.5,letterSpacing:'-.005em'}}>
        Tap slots to cycle type. Mission #12 is locked as Expert (triggers certificate).
      </div>

      <div className="slots">
        {plan.types.map((t, i) => {
          const isLast = i === 11;
          const locked = isLast || hasProgress;
          return (
            <div key={i}
                 className={`slot ${t.toLowerCase()} ${locked ? 'locked' : ''}`}
                 onClick={() => !locked && setPlanTypes(plan.id, i, cycle(t))}>
              <div className="slot-num">#{i+1}</div>
              <div className="slot-type">{t.charAt(0)}</div>
              {isLast && <div className="slot-lock">🔒</div>}
            </div>
          );
        })}
      </div>

      <div className="xp-info">
        <div className="xp-info-item">
          <div className="xp-info-label foundation">Foundation</div>
          <div className="xp-info-value">{counts.Foundation} × {xp.Foundation}</div>
        </div>
        <div className="xp-info-item">
          <div className="xp-info-label builder">Builder</div>
          <div className="xp-info-value">{counts.Builder} × {xp.Builder}</div>
        </div>
        <div className="xp-info-item">
          <div className="xp-info-label expert">Expert</div>
          <div className="xp-info-value">{counts.Expert} × {xp.Expert}</div>
        </div>
      </div>

      <div className="total-row">
        <div className="total-label">Plan XP Total</div>
        <div className="total-value">{total.toLocaleString()} XP</div>
      </div>

      {hasProgress && (
        <div style={{fontSize:12,color:'var(--ivory-mid)',textAlign:'center',marginTop:12,lineHeight:1.5,letterSpacing:'-.005em'}}>
          Mission types locked during play. Play Again to reset progress and edit.
        </div>
      )}

      <button className="config-btn" onClick={onDone} style={{marginTop:14}}>
        ← Back to Plans
      </button>
      <button className="play-again" onClick={onPlayAgain}>↻ Play Again (Reset Progress)</button>
    </div>
  );
}

function LevelUpOverlay({ reward, remaining, onClose }){
  const particles = useMemo(() => (
    Array.from({length: 30}).map((_, i) => ({
      left: Math.random() * 100,
      delay: Math.random() * 2,
      color: ['#ffd06a','#ffb83e','#ffa110','#fa520f','#fb6424'][i % 5],
      size: 6 + Math.random() * 6,
    }))
  ), [reward.level]);
  return (
    <div className="overlay">
      <div className="particles">
        {particles.map((p, i) => (
          <div key={i} className="particle" style={{
            left: p.left + '%',
            background: p.color,
            width: p.size,
            height: p.size,
            animationDelay: p.delay + 's',
            boxShadow: `0 0 12px ${p.color}`,
          }}/>
        ))}
      </div>
      <div className="overlay-inner">
        <div className="overlay-title">Level Up</div>
        <div className="overlay-level">LEVEL {reward.level}</div>
        <div className="overlay-name">{getLevelName(reward.level)}</div>
        <div className="big-reward">
          <div className="big-reward-icon">{reward.icon}</div>
          <div className="big-reward-tag">Reward Unlocked</div>
          <div className="big-reward-name">{reward.name}</div>
          <div className="big-reward-lv">Saved to Reward Vault</div>
        </div>
        <button className="dismiss" onClick={onClose}>Claim Reward</button>
        {remaining > 0 && <div className="queue-ind">+{remaining} more reward{remaining > 1 ? 's' : ''} waiting</div>}
      </div>
    </div>
  );
}

function ExpertLockPopup({ onClose }){
  return (
    <div className="lock-popup">
      <div className="lock-inner">
        <div className="lock-icon">🔒</div>
        <div className="lock-title">Expert Mission Locked</div>
        <div className="lock-msg">
          Expert missions require completing the full plan. Since this is a practical capstone project that determines your certificate, it requires all prior skills to be in place.
        </div>
        <button className="lock-close" onClick={onClose}>Got it</button>
      </div>
    </div>
  );
}

function BottomNav({ active, onChange, unseenRewards }){
  const tabs = [
    { key:'plans',    icon:'🗺️', label:'Plans'        },
    { key:'missions', icon:'⚔️', label:'All Missions' },
    { key:'rewards',  icon:'🏆', label:'Rewards'      },
    { key:'certs',    icon:'📜', label:'Certificates' },
  ];
  return (
    <div className="bottom-nav">
      {tabs.map(t => (
        <button key={t.key}
                className={`bnav-btn ${active === t.key ? 'active' : ''}`}
                onClick={() => onChange(t.key)}>
          <div className="bnav-icon">{t.icon}</div>
          <div className="bnav-label">{t.label}</div>
          {t.key === 'rewards' && unseenRewards > 0 && (
            <span className="bnav-badge">{unseenRewards}</span>
          )}
        </button>
      ))}
    </div>
  );
}

/* ─────────── App ─────────── */

function PlanCompletePopup({ planName, onViewCert, onDismiss }){
  return (
    <div className="lock-popup">
      <div className="plan-done-inner">
        <div className="plan-done-icon">🏆</div>
        <div className="plan-done-tag">Plan Completed</div>
        <div className="plan-done-title">{planName}</div>
        <div className="plan-done-sub">All 12 missions complete. Your certificate is ready.</div>
        <button className="plan-done-cta" onClick={onViewCert}>View Certificate</button>
        <button className="plan-done-dismiss" onClick={onDismiss}>Dismiss</button>
      </div>
    </div>
  );
}

function App(){
  // Editable plans (types can be changed in configurator)
  const [plans, setPlans] = useState(() =>
    PLAN_DEFS.map(d => ({ ...d, types: [...d.defaultTypes] }))
  );

  // { [planId]: { [missionIdx]: [bool,...lessonCount] } }
  const [lessonsDone, setLessonsDone] = useState({});

  // Global account-level XP (authoritative)
  const [xp, setXp] = useState(0);
  // Animated display XP (trails behind for CSS transition)
  const [displayXp, setDisplayXp] = useState(0);

  // Earned rewards { level, name, icon, seen }
  const [rewards, setRewards] = useState([]);
  // Earned certificates { planId, planName, date }
  const [certs, setCerts] = useState([]);

  // Navigation
  const [tab, setTab] = useState('plans');
  const [planView, setPlanView] = useState('list'); // list | map | mission | configure
  const [selectedPlan, setSelectedPlan] = useState(null);
  const [selectedMission, setSelectedMission] = useState(null);

  // Animation state
  const [xpPopup, setXpPopup] = useState(null);
  const [levelUpQueue, setLevelUpQueue] = useState([]);
  const [showLock, setShowLock] = useState(false);
  // { planId, planName } when plan just fully completed — shown after level-ups clear
  const [planCompletePopup, setPlanCompletePopup] = useState(null);
  const popupTimer = useRef(null);
  const prevXpRef = useRef(0);

  const hasProgress = useMemo(() => {
    if (xp > 0) return true;
    for (const pid in lessonsDone) {
      for (const mi in lessonsDone[pid]) {
        if ((lessonsDone[pid][mi] || []).some(Boolean)) return true;
      }
    }
    return false;
  }, [xp, lessonsDone]);

  // Mission state for a given plan
  const missionStateFor = useCallback((planId) => {
    const out = {};
    for (let i = 0; i < 12; i++) {
      const arr = lessonsDone[planId]?.[i] || [];
      const total = lessonCount(planId, i);
      const doneLessons = arr.filter(Boolean).length;
      out[i] = { doneLessons, totalLessons: total, done: doneLessons === total };
    }
    return out;
  }, [lessonsDone]);

  const progressByPlan = useMemo(() => {
    const out = {};
    plans.forEach(p => {
      let d = 0;
      for (let i = 0; i < 12; i++) {
        const arr = lessonsDone[p.id]?.[i] || [];
        const total = lessonCount(p.id, i);
        if (arr.filter(Boolean).length === total) d++;
      }
      out[p.id] = { done: d, total: 12 };
    });
    return out;
  }, [plans, lessonsDone]);

  const planProgressAll = useMemo(() => {
    const out = {};
    plans.forEach(p => { out[p.id] = missionStateFor(p.id); });
    return out;
  }, [plans, missionStateFor]);

  const unseenRewards = rewards.filter(r => !r.seen).length;

  /* ─── React to XP changes: animate bar, emit popup, queue level-ups ─── */
  useEffect(() => {
    const prev = prevXpRef.current;
    if (xp === prev) return;
    const gained = xp - prev;

    if (gained > 0) {
      // +XP popup
      setXpPopup(gained);
      if (popupTimer.current) clearTimeout(popupTimer.current);
      popupTimer.current = setTimeout(() => setXpPopup(null), 1200);

      // Animate progress bar with a short delay
      setTimeout(() => setDisplayXp(xp), 320);

      // Level-up detection (multi-level safe)
      const prevLevel = getLevel(prev);
      const newLevel = getLevel(xp);
      if (newLevel > prevLevel) {
        const fresh = [];
        for (let lv = prevLevel + 1; lv <= newLevel; lv++) {
          fresh.push(getRewardForLevel(lv));
        }
        setRewards(prevR => [...prevR, ...fresh.map(r => ({ ...r, seen: false }))]);
        setTimeout(() => {
          setLevelUpQueue(q => [...q, ...fresh]);
        }, 950);
      }
    } else {
      // XP reset (Play Again) — snap display back
      setDisplayXp(xp);
    }

    prevXpRef.current = xp;
  }, [xp]);

  /* ─── Actions ─── */

  const setPlanTypes = (planId, idx, type) => {
    if (idx === 11) return; // mission 12 always Expert
    setPlans(prev => {
      const nx = [...prev];
      const pl = { ...nx[planId], types: [...nx[planId].types] };
      pl.types[idx] = type;
      nx[planId] = pl;
      return nx;
    });
  };

  // Awards XP for a completed mission. Safe to call multiple times in rapid succession.
  const awardMissionXP = (planId, missionIdx) => {
    const plan = plans[planId];
    const gained = xpForMission(plan.types, missionIdx);
    setXp(prev => prev + gained);

    // Certificate check — runs after state settles
    setTimeout(() => {
      setLessonsDone(prev => {
        let allDone = true;
        for (let i = 0; i < 12; i++) {
          const arr = prev[planId]?.[i] || [];
          const total = lessonCount(planId, i);
          if (arr.filter(Boolean).length !== total) { allDone = false; break; }
        }
        if (allDone) {
          setCerts(prevC => {
            if (prevC.some(c => c.planId === planId)) return prevC;
            // First-time plan completion — also trigger celebration popup
            setPlanCompletePopup({ planId, planName: plan.name });
            return [...prevC, { planId, planName: plan.name, date: formatDate(new Date()) }];
          });
        }
        return prev;
      });
    }, 50);
  };

  const toggleLesson = (planId, missionIdx, lessonIdx) => {
    const total = lessonCount(planId, missionIdx);
    // Read current state from closure — NOT from inside updater (async race).
    const existing = lessonsDone[planId]?.[missionIdx] || Array(total).fill(false);
    if (existing[lessonIdx]) return;
    const newArr = [...existing];
    while (newArr.length < total) newArr.push(false);
    newArr[lessonIdx] = true;
    const becameComplete = newArr.filter(Boolean).length === total;

    setLessonsDone(prev => {
      const planMap = { ...(prev[planId] || {}) };
      planMap[missionIdx] = newArr;
      return { ...prev, [planId]: planMap };
    });

    if (becameComplete) {
      // setTimeout(0) lets React commit the lesson state before XP awards
      setTimeout(() => awardMissionXP(planId, missionIdx), 0);
    }
  };

  const completeEntireMission = (planId, missionIdx) => {
    const total = lessonCount(planId, missionIdx);
    // Read current state from closure — NOT from inside updater (async race).
    const existing = lessonsDone[planId]?.[missionIdx] || Array(total).fill(false);
    if (existing.filter(Boolean).length === total) return;

    setLessonsDone(prev => {
      const planMap = { ...(prev[planId] || {}) };
      planMap[missionIdx] = Array(total).fill(true);
      return { ...prev, [planId]: planMap };
    });

    // setTimeout(0) lets React commit the lesson state before XP awards
    setTimeout(() => awardMissionXP(planId, missionIdx), 0);
  };

  const handleAllMissionsTap = (planId, missionIdx, type) => {
    const st = planProgressAll[planId]?.[missionIdx];
    if (st?.done) return;
    if (type === 'Expert') { setShowLock(true); return; }
    completeEntireMission(planId, missionIdx);
  };

  const dismissLevelUp = () => setLevelUpQueue(prev => prev.slice(1));

  const markRewardSeen = (idx) => {
    setRewards(prev => prev.map((r, i) => i === idx ? { ...r, seen: true } : r));
  };

  const handlePlayAgain = () => {
    setLessonsDone({});
    setXp(0);
    setDisplayXp(0);
    setRewards([]);
    setCerts([]);
    setXpPopup(null);
    setLevelUpQueue([]);
    setPlanCompletePopup(null);
    setPlanView('list');
    setSelectedPlan(null);
    setSelectedMission(null);
    setTab('plans');
    prevXpRef.current = 0;
  };

  const handleTabChange = (t) => {
    setTab(t);
    if (t === 'plans') setPlanView('list');
  };

  /* ─── Rendering ─── */

  const renderPlansTab = () => {
    if (planView === 'configure') {
      return (
        <Configurator plans={plans}
                      setPlanTypes={setPlanTypes}
                      onDone={() => setPlanView('list')}
                      onPlayAgain={handlePlayAgain}
                      hasProgress={hasProgress} />
      );
    }
    if (planView === 'mission' && selectedPlan !== null && selectedMission !== null) {
      const plan = plans[selectedPlan];
      const total = lessonCount(plan.id, selectedMission);
      const lessons = lessonsDone[plan.id]?.[selectedMission] || Array(total).fill(false);
      return (
        <>
          <div className="back-bar">
            <button className="back-btn" onClick={() => { setPlanView('map'); setSelectedMission(null); }}>← Map</button>
            <div className="back-title">{plan.missionNames[selectedMission]}</div>
          </div>
          <LessonView plan={plan}
                      missionIdx={selectedMission}
                      lessonsDone={lessons}
                      onToggleLesson={(li) => toggleLesson(plan.id, selectedMission, li)}
                      onBackToMap={() => { setPlanView('map'); setSelectedMission(null); }} />
        </>
      );
    }
    if (planView === 'map' && selectedPlan !== null) {
      const plan = plans[selectedPlan];
      return (
        <>
          <div className="back-bar">
            <button className="back-btn" onClick={() => { setPlanView('list'); setSelectedPlan(null); }}>← Plans</button>
            <div className="back-title">{plan.name}</div>
          </div>
          <MissionMap plan={plan}
                      missionState={planProgressAll[plan.id]}
                      onOpenMission={(i) => { setSelectedMission(i); setPlanView('mission'); }} />
        </>
      );
    }
    return (
      <PlansList plans={plans}
                 progressByPlan={progressByPlan}
                 certs={certs}
                 onOpenPlan={(id) => { setSelectedPlan(id); setPlanView('map'); }}
                 onOpenConfig={() => setPlanView('configure')} />
    );
  };

  const currentLevelUp = levelUpQueue[0];

  return (
    <div>
      <div className="identity-band" aria-hidden="true">
        <span/><span/><span/><span/><span/><span/>
      </div>
      <TopHead />
      <ProgressBar xp={displayXp} xpPopup={xpPopup} />

      {tab === 'plans'    && renderPlansTab()}
      {tab === 'missions' && <AllMissions plans={plans} planProgress={planProgressAll} onTap={handleAllMissionsTap} />}
      {tab === 'rewards'  && <RewardsTab rewards={rewards} onTap={markRewardSeen} />}
      {tab === 'certs'    && <CertificatesTab certificates={certs} />}

      <BottomNav active={tab} onChange={handleTabChange} unseenRewards={unseenRewards} />

      {currentLevelUp && (
        <LevelUpOverlay reward={currentLevelUp}
                        remaining={levelUpQueue.length - 1}
                        onClose={dismissLevelUp} />
      )}
      {!currentLevelUp && planCompletePopup && (
        <PlanCompletePopup
          planName={planCompletePopup.planName}
          onViewCert={() => {
            setPlanCompletePopup(null);
            setPlanView('list');
            setSelectedPlan(null);
            setSelectedMission(null);
            setTab('certs');
          }}
          onDismiss={() => setPlanCompletePopup(null)} />
      )}
      {showLock && <ExpertLockPopup onClose={() => setShowLock(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
